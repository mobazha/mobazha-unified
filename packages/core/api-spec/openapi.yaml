openapi: '3.0.3'
info:
  title: Mobazha Hosting API
  description: |
    Mobazha SaaS Hosting platform API. This API provides:
    - **Hosting-native endpoints** (`/api/...`): Authentication, group marketplace, encryption, relay, etc.
    - **Node proxy endpoints** (`/v1/...`): Proxied to underlying mobazha3.0 node instances (orders, listings, profiles, etc.)

    ## Authentication
    Most endpoints require a JWT token obtained via `/api/signin` or platform-specific sign-in endpoints.
    Pass the token in the `Authorization` header as a Bearer token.

    ## Multi-tenancy
    Each authenticated user maps to a tenant (node). The tenant context is resolved from the JWT token.
  version: '1.0.0'
  contact:
    name: Mobazha Team
    url: https://mobazha.com
  license:
    name: BSL-1.1
    url: https://mariadb.com/bsl11/

servers:
  - url: /
    description: Current server

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Auth
    description: Authentication and sign-in (Casdoor, Telegram, Discord)
  - name: Account
    description: Multi-account linking
  - name: Group Marketplace
    description: Telegram/Discord group marketplace management
  - name: Product Groups
    description: Product group CRUD and item management
  - name: User Groups
    description: User group management and membership
  - name: Product Group Auth
    description: Product group authorization rules
  - name: Store Access
    description: Store access requests, settings, and whitelist
  - name: Store Links
    description: Short link generation and resolution
  - name: Store Bot
    description: Telegram bot binding for stores
  - name: Encryption
    description: Key synchronization and privacy (Phase 2)
  - name: Relay
    description: Gas-less transaction relay service
  - name: Matrix
    description: Matrix chat integration
  - name: IPNS
    description: IPNS record publishing and retrieval
  - name: Stream
    description: GetStream chat authentication
  - name: Stripe
    description: Stripe payment integration
  - name: Node - Orders
    description: 'Order lifecycle (proxied to mobazha3.0 node)'
  - name: Node - Listings
    description: 'Listing management (proxied to mobazha3.0 node)'
  - name: Node - Profiles
    description: 'Profile management (proxied to mobazha3.0 node)'
  - name: Node - Wallet
    description: 'Wallet operations (proxied to mobazha3.0 node)'
  - name: Node - Chat
    description: 'P2P chat (proxied to mobazha3.0 node)'
  - name: Node - Media
    description: 'Image and file operations (proxied to mobazha3.0 node)'
  - name: Admin
    description: 'Tenant lifecycle management (admin-only)'

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Casdoor or platform sign-in

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string

    SigninRequest:
      type: object
      properties:
        code:
          type: string
          description: OAuth authorization code from Casdoor
        state:
          type: string
      required: [code, state]

    SigninResponse:
      type: object
      properties:
        status:
          type: string
        token:
          type: string
          description: JWT access token

    TelegramSigninRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        photo_url:
          type: string
        auth_date:
          type: integer
        hash:
          type: string
      required: [id, auth_date, hash]

    ServerInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        features:
          type: object

    # Group Marketplace schemas
    GroupMarketplace:
      type: object
      properties:
        platform:
          type: string
          enum: [telegram, discord]
        chatID:
          type: string
        chatTitle:
          type: string
        chatUsername:
          type: string
        createdAt:
          type: string
          format: date-time

    SellerApplyRequest:
      type: object
      properties:
        userID:
          type: string
      required: [userID]

    GroupMarketplaceSeller:
      type: object
      properties:
        id:
          type: integer
        tenantID:
          type: string
        platform:
          type: string
        chatID:
          type: string
        userID:
          type: string
        peerID:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        isVisible:
          type: boolean
        appliedAt:
          type: string
          format: date-time

    ReviewSellerRequest:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
      required: [status]

    # Product Group schemas
    ProductGroup:
      type: object
      properties:
        id:
          type: integer
        tenantID:
          type: string
        userID:
          type: string
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateProductGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required: [name]

    ProductGroupItem:
      type: object
      properties:
        id:
          type: integer
        productGroupID:
          type: integer
        listingSlug:
          type: string
        peerID:
          type: string

    AddProductGroupItemRequest:
      type: object
      properties:
        listingSlug:
          type: string
        peerID:
          type: string
      required: [listingSlug, peerID]

    # User Group schemas
    UserGroup:
      type: object
      properties:
        id:
          type: integer
        tenantID:
          type: string
        ownerPeerID:
          type: string
        name:
          type: string
        description:
          type: string

    UserGroupMember:
      type: object
      properties:
        id:
          type: integer
        userGroupID:
          type: integer
        peerID:
          type: string
        addedAt:
          type: string
          format: date-time

    # Store Access schemas
    StoreAccessRequest:
      type: object
      properties:
        id:
          type: integer
        storePeerID:
          type: string
        requestorPeerID:
          type: string
        note:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]

    StoreAccessSettings:
      type: object
      properties:
        peerID:
          type: string
        allowExternalApplications:
          type: boolean
        autoApprove:
          type: boolean

    # Store Link schemas
    StoreShortLink:
      type: object
      properties:
        shortCode:
          type: string
        peerID:
          type: string
        clickCount:
          type: integer
        isActive:
          type: boolean

    # Store Bot schemas
    StoreBot:
      type: object
      properties:
        id:
          type: integer
        peerID:
          type: string
        botID:
          type: integer
          format: int64
        botUsername:
          type: string
        isActive:
          type: boolean

    StoreBotBindRequest:
      type: object
      properties:
        botToken:
          type: string
      required: [botToken]

    # Encryption schemas
    SyncListingKeyRequest:
      type: object
      properties:
        slug:
          type: string
        masterKey:
          type: string
        isPublic:
          type: boolean
      required: [slug, masterKey]

    SyncProductGroupKeyRequest:
      type: object
      properties:
        productGroupID:
          type: integer
        sharedKey:
          type: string
        keyVersion:
          type: integer
      required: [productGroupID, sharedKey]

    # Relay schemas
    RelayExecuteRequest:
      type: object
      properties:
        chainType:
          type: string
          description: 'EVM chain type: eth, bsc, polygon, etc.'
        to:
          type: string
          description: Contract address
        data:
          type: string
          description: Call data (hex with 0x prefix)
        orderId:
          type: string
      required: [chainType, to, data]

    RelayExecuteResponse:
      type: object
      properties:
        success:
          type: boolean
        txHash:
          type: string
        error:
          type: string

    RelayStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
        gasWalletAddress:
          type: string
        supportedChains:
          type: array
          items:
            type: string

    # Matrix schemas
    MatrixConfig:
      type: object
      properties:
        homeserverUrl:
          type: string
        enabled:
          type: boolean

    # IPNS schemas
    IpnsRecord:
      type: object
      properties:
        peerID:
          type: string
        value:
          type: string
        sequence:
          type: integer
          format: int64

    # Product Group Authorization schemas
    ProductGroupAuthorization:
      type: object
      properties:
        id:
          type: integer
        productGroupID:
          type: integer
        authType:
          type: string
          enum: [group_marketplace, user_group]
        groupPlatform:
          type: string
        groupChatID:
          type: string
        userGroupID:
          type: integer

    # Node proxy schemas (simplified)
    Order:
      type: object
      description: Order object from mobazha3.0 node
      properties:
        orderId:
          type: string
        state:
          type: string
        timestamp:
          type: string
          format: date-time

    Listing:
      type: object
      description: Listing object from mobazha3.0 node
      properties:
        slug:
          type: string
        title:
          type: string

    Profile:
      type: object
      description: Profile object from mobazha3.0 node
      properties:
        peerID:
          type: string
        name:
          type: string

    Tenant:
      type: object
      description: SaaS tenant record
      properties:
        tenantID:
          type: string
        peerID:
          type: string
        status:
          type: string
          enum: [active, suspended, archived, deleted]
        plan:
          type: string
        suspendReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  # =========================================================================
  # Health & Observability
  # =========================================================================
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: All dependencies ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: One or more dependencies not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string

  # =========================================================================
  # Auth
  # =========================================================================
  /api/signin:
    post:
      tags: [Auth]
      summary: Sign in via Casdoor OAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SigninRequest'
      responses:
        '200':
          description: Sign-in successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SigninResponse'

  /api/telegramSignin:
    post:
      tags: [Auth]
      summary: Sign in via Telegram Login Widget
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramSigninRequest'
      responses:
        '200':
          description: Sign-in successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SigninResponse'

  /api/telegramMiniAppSignin:
    post:
      tags: [Auth]
      summary: Sign in via Telegram Mini App
      security: []
      responses:
        '200':
          description: Sign-in successful

  /api/checkTelegramMiniAppUser:
    post:
      tags: [Auth]
      summary: Check if Telegram Mini App user exists
      security: []
      responses:
        '200':
          description: User check result

  /api/discordMiniAppSignin:
    post:
      tags: [Auth]
      summary: Sign in via Discord embedded app
      security: []
      responses:
        '200':
          description: Sign-in successful

  /api/discordOAuth2Token:
    post:
      tags: [Auth]
      summary: Exchange Discord OAuth2 code for token
      security: []
      responses:
        '200':
          description: Token exchange successful

  /api/checkDiscordUser:
    post:
      tags: [Auth]
      summary: Check if Discord user exists
      security: []
      responses:
        '200':
          description: User check result

  /api/v1/discord/oauth/callback:
    get:
      tags: [Auth]
      summary: Discord OAuth callback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect after OAuth

  /api/userinfo:
    get:
      tags: [Auth]
      summary: Get current user info
      responses:
        '200':
          description: User information

  /api/serverInfo:
    get:
      tags: [Auth]
      summary: Get server configuration info
      security: []
      responses:
        '200':
          description: Server info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'

  # =========================================================================
  # Account Binding
  # =========================================================================
  /api/account/linked:
    get:
      tags: [Account]
      summary: Get linked accounts for current user
      responses:
        '200':
          description: List of linked accounts

  /api/account/unlink:
    post:
      tags: [Account]
      summary: Unlink a platform account
      responses:
        '200':
          description: Account unlinked

  /api/account/link-url:
    get:
      tags: [Account]
      summary: Get URL to link a new platform account
      responses:
        '200':
          description: Link URL

  /api/account/link-callback:
    get:
      tags: [Account]
      summary: Callback for account linking
      responses:
        '200':
          description: Linking completed

  # =========================================================================
  # IPNS
  # =========================================================================
  /api/ipns:
    post:
      tags: [IPNS]
      summary: Publish IPNS record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IpnsRecord'
      responses:
        '200':
          description: Record published

  /api/ipns/{peerID}:
    get:
      tags: [IPNS]
      summary: Get IPNS record for peer
      security: []
      parameters:
        - name: peerID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: IPNS record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpnsRecord'
        '404':
          description: Record not found

  # =========================================================================
  # Stream
  # =========================================================================
  /api/stream/auth:
    get:
      tags: [Stream]
      summary: Get GetStream authentication token
      responses:
        '200':
          description: Stream auth token

  # =========================================================================
  # Stripe (hosting level)
  # =========================================================================
  /api/stripe/account/{peerID}:
    get:
      tags: [Stripe]
      summary: Get Stripe account info by peerID
      security: []
      parameters:
        - name: peerID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stripe account info

  # =========================================================================
  # Group Marketplace
  # =========================================================================
  /api/v1/group-marketplace/{platform}:
    post:
      tags: [Group Marketplace]
      summary: Register a group marketplace
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
            enum: [telegram, discord]
      responses:
        '200':
          description: Group marketplace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMarketplace'

  /api/v1/group-marketplace/{platform}/{chatID}:
    get:
      tags: [Group Marketplace]
      summary: Get group marketplace details
      security: []
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group marketplace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMarketplace'

  /api/v1/group-marketplace/{platform}/{chatID}/sellers/apply:
    post:
      tags: [Group Marketplace]
      summary: Apply as a seller in a group marketplace
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerApplyRequest'
      responses:
        '200':
          description: Application submitted

  /api/v1/group-marketplace/{platform}/{chatID}/sellers:
    get:
      tags: [Group Marketplace]
      summary: List sellers in a group marketplace
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of sellers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupMarketplaceSeller'

  /api/v1/group-marketplace/{platform}/{chatID}/sellers/{sellerID}/review:
    put:
      tags: [Group Marketplace]
      summary: Review (approve/reject) a seller application
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
        - name: sellerID
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewSellerRequest'
      responses:
        '200':
          description: Review submitted

  /api/v1/group-marketplace/{platform}/{chatID}/listings:
    get:
      tags: [Group Marketplace]
      summary: Get listings from a group marketplace
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Listings in the group

  /api/v1/group-marketplace/{platform}/{chatID}/sellers/{sellerID}/product-groups:
    put:
      tags: [Group Marketplace]
      summary: Update seller's product groups in a marketplace
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
        - name: sellerID
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product groups updated

  /api/v1/group-marketplace/{platform}/{chatID}/featured:
    get:
      tags: [Group Marketplace]
      summary: Get featured sellers
      security: []
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Featured sellers list

  /api/v1/group-marketplace/{platform}/{chatID}/banners:
    get:
      tags: [Group Marketplace]
      summary: Get banner listings
      security: []
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Banner listings

  /api/v1/group-marketplace/{platform}/{chatID}/search:
    get:
      tags: [Group Marketplace]
      summary: Search listings in a group marketplace
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Search results

  /api/v1/group-marketplace/{platform}/{chatID}/admin/featured:
    post:
      tags: [Group Marketplace]
      summary: Add a featured seller (admin)
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Featured seller added
    delete:
      tags: [Group Marketplace]
      summary: Remove a featured seller (admin)
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Featured seller removed

  /api/v1/group-marketplace/{platform}/{chatID}/admin/banners:
    post:
      tags: [Group Marketplace]
      summary: Add a banner listing (admin)
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Banner added
    delete:
      tags: [Group Marketplace]
      summary: Remove a banner listing (admin)
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Banner removed

  /api/v1/sellers/{userID}/group-marketplaces:
    get:
      tags: [Group Marketplace]
      summary: Get group marketplaces for a seller
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Seller's group marketplaces

  /api/v1/sellers/{userID}/visibility/{platform}/{chatID}:
    put:
      tags: [Group Marketplace]
      summary: Update seller visibility in a marketplace
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: string
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Visibility updated

  /api/v1/telegram/webhook:
    post:
      tags: [Group Marketplace]
      summary: Telegram bot webhook
      security: []
      responses:
        '200':
          description: Webhook processed

  /api/v1/group-marketplace/groups:
    get:
      tags: [Group Marketplace]
      summary: Get user's groups
      responses:
        '200':
          description: User's groups

  /api/v1/group-marketplace/telegram/{chatID}/verify-member:
    post:
      tags: [Group Marketplace]
      summary: Verify Telegram group membership
      parameters:
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification result

  /api/v1/group-marketplace/discord/{chatID}/verify-member:
    post:
      tags: [Group Marketplace]
      summary: Verify Discord server membership
      parameters:
        - name: chatID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification result

  /api/v1/group-marketplace/{platform}/{chatID}/check-admin:
    post:
      tags: [Group Marketplace]
      summary: Check if user is admin in group
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
        - name: chatID
          in: path
          required: true
          schema:
            type: string
