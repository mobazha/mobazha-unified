name: Bug 报告
description: 报告一个 Bug
title: '[Bug]: '
labels: ['bug', 'needs triage']
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽可能详细地填写以下信息。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个 Bug
      placeholder: 告诉我们发生了什么
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供详细的复现步骤
      placeholder: |
        1. 打开 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 你在哪个平台遇到这个问题
      options:
        - Web (桌面浏览器)
        - Web (移动浏览器)
        - PWA
      default: 0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 浏览器
      description: 你使用的浏览器和版本
      placeholder: 例如 Chrome 120, Safari 17

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 你使用的操作系统
      placeholder: 例如 macOS 14, Windows 11, iOS 17

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 如果有相关的错误日志，请粘贴在这里
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，请添加截图来帮助解释你的问题

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他你认为相关的信息
