name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# 取消之前的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: 20

jobs:
  # ============ 代码检查 ============
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Check codegen drift
        run: bash scripts/check-codegen-drift.sh

      - name: Check default release boundary
        run: pnpm community:check

      - name: Check documentation authority boundaries
        run: pnpm docs:authority:check

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

  # ============ 单元测试 ============
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # A test that loops forever blocks the event loop, so vitest's own
    # testTimeout never fires and the run hangs until the job's ceiling —
    # 6 hours by default. Only a wall clock outside the process catches that.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      # Every package, not just core. apps/web's 134 files ran only in the
      # local pre-push hook until now, so a test that hung forever sat here
      # unnoticed while CI stayed green.
      - name: Run unit tests
        run: pnpm test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/core/coverage/coverage-final.json,./packages/ui/coverage/coverage-final.json
          fail_ci_if_error: false

  # ============ 构建 ============
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Verify packed Commerce Kit consumers
        run: pnpm commerce-kit:consumers

      - name: Build Next.js production server
        run: pnpm --filter @mobazha/web build:next

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next
            apps/web/dist
            packages/*/dist
          retention-days: 7

  # ============ API Breaking Change 检测 ============
  api-compat:
    name: API Breaking Change Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if BREAKING label
        id: label-check
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -qi 'breaking'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ BREAKING label detected — skipping breaking-change gate"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect breaking changes
        if: steps.label-check.outputs.skip != 'true'
        uses: oasdiff/oasdiff-action/breaking@v0.0.44
        with:
          base: 'origin/${{ github.base_ref }}:packages/core/api-spec/openapi.json'
          revision: 'HEAD:packages/core/api-spec/openapi.json'
          fail-on: ERR

  # ============ 安全检查 ============
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Run production security audit
        run: ./scripts/security-audit.sh

  # ============ 依赖检查 ============
  deps:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Check for outdated dependencies
        run: pnpm outdated || true
