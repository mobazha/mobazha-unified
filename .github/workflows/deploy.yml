name: Deploy

on:
  # 等待 CI workflow 完成后触发
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PNPM_VERSION: 9.0.0
  NODE_VERSION: 20

jobs:
  # ============ 部署到 Vercel (Staging) ============
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # 只在 CI 成功或手动触发时运行
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set environment variables
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.API_URL || 'http://localhost:5000' }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_MATRIX_HOMESERVER=${{ vars.MATRIX_HOMESERVER || 'https://matrix.org' }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_USE_MOCK_DATA=false" >> $GITHUB_ENV

      - name: Build
        run: pnpm build

      - name: Deploy to Vercel (Staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
        continue-on-error: true

      - name: Deploy result
        run: |
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Deployed to: ${{ steps.deploy.outputs.url }}"
          else
            echo "⚠️ Vercel deployment skipped (missing secrets or configuration)"
            echo "To enable Vercel deployment, add the following secrets:"
            echo "  - VERCEL_TOKEN"
            echo "  - VERCEL_ORG_ID"
            echo "  - VERCEL_PROJECT_ID"
          fi

  # ============ 部署到 Vercel (Production) ============
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set environment variables
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ vars.API_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_MATRIX_HOMESERVER=${{ vars.MATRIX_HOMESERVER }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_USE_MOCK_DATA=false" >> $GITHUB_ENV

      - name: Build
        run: pnpm build

      - name: Deploy to Vercel (Production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./apps/web

  # ============ 部署到 Docker (可选) ============
  deploy-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
