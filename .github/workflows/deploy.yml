name: Deploy Web Frontend

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - saas
          - standalone
          - all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PNPM_VERSION: 9.0.0
  NODE_VERSION: 20

jobs:
  # ============================================================
  # Build: SaaS image
  # ============================================================
  build-saas:
    name: Build SaaS Image
    runs-on: ubuntu-latest
    if: >-
      github.event.inputs.target == 'saas' || github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web-saas
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push SaaS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=web-saas
          cache-to: type=gha,mode=max,scope=web-saas
          build-args: |
            NEXT_PUBLIC_ENV_MODE=test
            NEXT_PUBLIC_USE_MOCK_DATA=false
            NEXT_PUBLIC_AUTH_MODE=hosted
            NEXT_PUBLIC_API_BASE_URL=${{ vars.SAAS_API_BASE_URL }}
            NEXT_PUBLIC_CASDOOR_URL=${{ vars.SAAS_CASDOOR_URL }}
            NEXT_PUBLIC_CASDOOR_CLIENT_ID=${{ vars.SAAS_CASDOOR_CLIENT_ID }}
            NEXT_PUBLIC_STORE_SUBDOMAIN_BASE=mobazha.org
            NEXT_PUBLIC_MARKETPLACE_SUBDOMAIN_BASE=mobazha.org

  # ============================================================
  # Build: Standalone image
  # ============================================================
  build-standalone:
    name: Build Standalone Image
    runs-on: ubuntu-latest
    if: >-
      github.event.inputs.target == 'standalone' || github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web-standalone
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Standalone image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=web-standalone
          cache-to: type=gha,mode=max,scope=web-standalone
          build-args: |
            NEXT_PUBLIC_ENV_MODE=test
            NEXT_PUBLIC_USE_MOCK_DATA=false
            NEXT_PUBLIC_AUTH_MODE=standalone
            NEXT_PUBLIC_CASDOOR_URL=${{ vars.SAAS_CASDOOR_URL }}
            NEXT_PUBLIC_CASDOOR_CLIENT_ID=${{ vars.SAAS_CASDOOR_CLIENT_ID }}
            NEXT_PUBLIC_SAAS_URL=${{ vars.STANDALONE_SAAS_URL }}

  # ============================================================
  # Deploy: SaaS
  # ============================================================
  deploy-saas:
    name: Deploy SaaS
    needs: build-saas
    runs-on: ubuntu-latest
    if: >-
      github.event.inputs.target == 'saas' || github.event.inputs.target == 'all'
    permissions:
      packages: read
    environment: test-saas
    steps:
      - name: Deploy to SaaS server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SAAS_HOST }}
          username: root
          key: ${{ secrets.SAAS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            GHCR_IMAGE="ghcr.io/${{ github.repository }}/web-saas:latest"
            LOCAL_IMAGE="mobazha-web-saas:test"

            echo "Pulling image from GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$GHCR_IMAGE"

            echo "Retagging..."
            docker tag "$GHCR_IMAGE" "$LOCAL_IMAGE"

            echo "Restarting container..."
            cd /opt/mobazha/saas
            docker compose up -d --force-recreate --no-deps web

            echo "Waiting for container..."
            sleep 5
            docker logs --since 10s "$(docker compose ps -q web)" 2>&1 | tail -10

            echo "Cleaning up old images..."
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Deploy: Standalone
  # ============================================================
  deploy-standalone:
    name: Deploy Standalone
    needs: build-standalone
    runs-on: ubuntu-latest
    if: >-
      github.event.inputs.target == 'standalone' || github.event.inputs.target == 'all'
    permissions:
      packages: read
    environment: test-standalone
    steps:
      - name: Deploy to Standalone server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STANDALONE_HOST }}
          username: root
          key: ${{ secrets.STANDALONE_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            GHCR_IMAGE="ghcr.io/${{ github.repository }}/web-standalone:latest"
            LOCAL_IMAGE="mobazha-web-standalone:test"

            echo "Pulling image from GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$GHCR_IMAGE"

            echo "Retagging..."
            docker tag "$GHCR_IMAGE" "$LOCAL_IMAGE"

            echo "Restarting container..."
            cd /opt/mobazha/standalone
            docker compose up -d --force-recreate --no-deps web

            echo "Waiting for container..."
            sleep 5
            docker logs --since 10s "$(docker compose ps -q web)" 2>&1 | tail -10

            echo "Cleaning up old images..."
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
