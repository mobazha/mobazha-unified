<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#00bcd4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>Mobazha - Dev</title>
    <meta name="description" content="Shop and grow with cryptos - A decentralized peer-to-peer marketplace" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Telegram Mini App SDK — loaded only inside Telegram WebView.
         window.Telegram is injected by Telegram before any scripts run;
         usePlatform useEffect re-detects if SDK arrives late. -->
    <script>
      if (window.Telegram) {
        var s = document.createElement('script');
        s.src = 'https://telegram.org/js/telegram-web-app.js';
        document.head.appendChild(s);
      }
    </script>
    
    <!-- 防闪烁脚本 - 在页面加载前立即应用主题 -->
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('mobazha-theme') || 'classic';
          const mode = localStorage.getItem('mobazha-theme-mode') || 'system';
          let resolvedMode = mode;
          if (mode === 'system') {
            resolvedMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          if (resolvedMode === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
