<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#00bcd4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>Mobazha</title>
    <meta name="description" content="Shop and grow with cryptos - A decentralized peer-to-peer marketplace" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Telegram Mini App SDK — loaded SYNCHRONOUSLY inside Telegram WebView.
         window.Telegram is injected by Telegram before any scripts run.
         We use document.write to load the SDK synchronously so that
         window.Telegram.WebApp is available before React mounts
         (createElement+appendChild is async and causes race conditions). -->
    <script>
      var _tg = window.Telegram;
      var _hash = location.hash || '';
      var _hasTgHash = _hash.indexOf('tgWebAppData') !== -1;
      if (_tg || _hasTgHash) {
        window.__EMBEDDED_APP__ = true;
        document.write('<scr' + 'ipt src="https://telegram.org/js/telegram-web-app.js"></scr' + 'ipt>');
      }
    </script>
    
    <!-- Node.js global polyfill for libraries like multicoin-address-validator -->
    <script>if(typeof global==="undefined"){window.global=window;}</script>
    
    <!-- Runtime config — injected by container init at startup (standalone mode).
         Sets window.__RUNTIME_CONFIG__ with SAAS_API_URL and other env-specific values.
         Not present during local dev or SaaS deployments; onerror is a silent no-op. -->
    <script src="/runtime-config.js" onerror=""></script>
    
    <!-- 防闪烁脚本 - 在页面加载前立即应用主题 + Telegram 嵌入态 (MVP-3 M2) -->
    <script>
      (function() {
        try {
          var root = document.documentElement;

          // 1) Mobazha 主题（既有逻辑）
          var theme = localStorage.getItem('mobazha-theme') || 'classic';
          var mode = localStorage.getItem('mobazha-theme-mode') || 'system';
          var resolvedMode = mode;
          if (mode === 'system') {
            resolvedMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          root.setAttribute('data-theme', theme);
          if (resolvedMode === 'dark') {
            root.classList.add('dark');
          }

          // 2) MVP-3 M2 — Telegram 嵌入态检测 + 主题色即刻预涂（防白屏）
          //    与 line 28-36 的 SDK 检测条件保持一致：window.Telegram 存在 或 URL hash
          //    含 tgWebAppData（Telegram 客户端始终会拼进来）。
          var isTG = !!window.Telegram || (location.hash || '').indexOf('tgWebAppData') !== -1;
          if (!isTG) return;

          root.setAttribute('data-embedded', 'telegram');

          // 从 URL hash 的 tgWebAppThemeParams 里解颜色，React mount 之前就
          // 把 --theme-* 直接设为 TG 自身颜色，避免白底→TG 深底瞬闪。
          // 注意：直接写 --theme-*（不是 --tg-*），与 TGMiniAppProvider 的
          // 运行时逻辑一致，避免 CSS 自引用陷阱。
          var themeMatch = (location.hash || '').match(/tgWebAppThemeParams=([^&]+)/);
          var appliedBg = null;
          if (themeMatch) {
            try {
              var params = JSON.parse(decodeURIComponent(themeMatch[1]));
              var norm = function(c) {
                return c && c.charAt(0) !== '#' ? '#' + c : c;
              };
              appliedBg = norm(params.bg_color || params.secondary_bg_color) || null;
              if (appliedBg) {
                root.style.setProperty('--theme-background', appliedBg);
                var secBg = norm(params.secondary_bg_color);
                if (secBg) {
                  root.style.setProperty('--theme-backgroundAlt', secBg);
                  root.style.setProperty('--theme-surface', secBg);
                }
                var txt = norm(params.text_color);
                if (txt) root.style.setProperty('--theme-textPrimary', txt);
                var hint = norm(params.hint_color);
                if (hint) root.style.setProperty('--theme-textMuted', hint);
                root.style.backgroundColor = appliedBg;
                var meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.setAttribute('content', appliedBg);
              }
            } catch (e) { /* ignore parse error */ }
          }

          // 没拿到 themeParams 但系统是 dark：退化到 TG 深色默认，不让白底闪一下
          if (!appliedBg && resolvedMode === 'dark') {
            root.style.backgroundColor = '#17212b';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
