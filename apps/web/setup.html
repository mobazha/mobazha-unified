<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#00bcd4" />
    <title>Mobazha</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <script>
      if (typeof global === 'undefined') {
        window.global = window;
      }
    </script>
    <script src="/runtime-config.js" onerror=""></script>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('mobazha-theme') || 'classic';
          var mode = localStorage.getItem('mobazha-theme-mode') || 'system';
          var resolvedMode = mode;
          if (mode === 'system') {
            resolvedMode = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          if (resolvedMode === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/setup-entry.tsx"></script>
  </body>
</html>
