# git-cliff configuration for generated changelogs

[changelog]
# Header template
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
# Body template
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.github.username %} by @{{ commit.github.username }}{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
# Footer template
footer = """
<!-- generated by git-cliff -->
"""
# Trim leading and trailing whitespace
trim = true

[git]
# Parse Conventional Commits
conventional_commits = true
# Exclude commits that do not follow the convention
filter_unconventional = true
# Do not split breaking changes into a separate group
split_commits = false
# Commit parsing rules
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^doc", group = "<!-- 3 -->📚 Documentation" },
  { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
  { message = "^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { body = ".*security", group = "<!-- 8 -->🛡️ Security" },
  { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
]
# Do not retain breaking commits that match a skip rule
protect_breaking_commits = false
# Keep empty groups out of the generated changelog
filter_commits = false
# Release tag pattern
tag_pattern = "v[0-9].*"
# Sort commits chronologically within each group
sort_commits = "oldest"
